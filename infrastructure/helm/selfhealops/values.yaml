replicaCount: 2

image:
  repository: selfhealops/api
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

celery:
  replicaCount: 2
  image:
    repository: selfhealops/worker
    tag: "latest"
