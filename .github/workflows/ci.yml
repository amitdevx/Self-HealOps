name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    name: Test ${{ matrix.test_module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_module: 
          - test_agents.py
          - test_api.py
          - test_database.py
          - test_execution_service.py
          - test_github.py
          - test_nim.py
          - test_security.py
          - test_workflow.py

    # We provide dummy environment variables for the test suite. 
    # Since our tests mock out real API calls and use an in-memory SQLite database, 
    # no actual secrets are required.
    env:
      GITHUB_TOKEN: "dummy_github_token"
      NVIDIA_API_KEY: "dummy_nvidia_key"
      SECRET_KEY: "dummy_secret_for_tests_only"
      GITHUB_WEBHOOK_SECRET: "dummy_webhook_secret"
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      CELERY_BROKER_URL: "redis://localhost:6379/0"
      CELERY_RESULT_BACKEND: "redis://localhost:6379/1"
      ENVIRONMENT: "test"

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run ${{ matrix.test_module }}
      run: |
        PYTHONPATH=. python -m pytest backend/tests/${{ matrix.test_module }} -v --tb=short
